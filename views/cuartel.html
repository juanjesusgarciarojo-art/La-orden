<!-- Tab: Enlace HQ (Chat) -->
<div id="tab-comunicaciones" class="tab-content" style="animation: none;">
    <h2 style="color: #ff3333;">CANAL DE EMERGENCIA ALPHA — CUARTEL GENERAL</h2>
    <p style="color: #aaa; margin-bottom: 20px;">ENLACE DIRECTO CON EL MANDO CENTRAL DE LA ORDEN.</p>

    <div id="chat-container" class="glass-panel"
        style="height: calc(100vh - 350px); min-height: 300px; display: flex; flex-direction: column; border-color: #ff3333; background: rgba(255, 51, 51, 0.02); padding: 0; overflow: hidden;">

        <div id="chat-messages"
            style="flex: 1; overflow-y: auto; padding: 20px; font-family: 'Courier New', Courier, monospace; font-size: 0.95rem;">
            <!-- Mensajes inyectados por JS -->
            <div style="color: #ff3333; opacity: 0.6; margin-bottom: 15px;">[ CONEXIÓN ESTABLECIDA CON HQ ]</div>
        </div>

        <div class="chat-input-area"
            style="padding: 15px; border-top: 1px solid rgba(255, 51, 51, 0.3); background: rgba(0,0,0,0.3); display: flex; gap: 10px;">
            <input type="text" id="chat-input-text" placeholder="ESCRIBA UN MENSAJE PARA EL MANDO..."
                style="flex: 1; background: transparent; border: 1px solid #ff3333; color: #ff3333; padding: 10px; font-family: inherit; outline: none;"
                autocomplete="off">
            <button class="agency-btn" id="btn-enviar-chat"
                style="border-color: #ff3333; color: #ff3333; padding: 10px 20px; min-width: auto;">ENVIAR</button>
        </div>
    </div>
</div>
